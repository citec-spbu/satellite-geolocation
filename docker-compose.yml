version: '3.8'

services:
  # Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: drone_localization_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # MinIO - Object Storage
  minio:
    image: minio/minio:latest
    container_name: drone_localization_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drone_localization_api
    ports:
      - "8000:8000"
    volumes:
      - ./drone_localization:/app/drone_localization
      - ./weights:/app/weights
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    restart: unless-stopped
    command: pixi run dev-api

  # Streamlit Frontend
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drone_localization_ui
    ports:
      - "8501:8501"
    volumes:
      - ./drone_localization:/app/drone_localization
    depends_on:
      - api  # ← запустить api перед ui
    environment:
      - API_URL=http://api:8000
    restart: unless-stopped
    command: pixi run dev-ui  # ← запустить UI команду

volumes:
  qdrant_storage:
  minio_data: